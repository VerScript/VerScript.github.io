name: Jules AI Agent Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  jules-run:
    runs-on: ubuntu-latest

    steps:
      - name: Daily Scan
        uses: google-labs-code/jules-action@main
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
                    prompt: |
            You are a daily automated software assistant. Scan the entire repository for bugs, security vulnerabilities, or code improvements.
            - If any bugs are found: provide code solutions and explain the fixes.
            - If no bugs or security/code improvements are found: do not modify any files with logs or findings. Instead, just create an empty Pull Request (with no file changes/empty commit) with the subject "Jules: Daily Run".
            - Do not create or update any daily run findings log files.
            - The subject of the Pull Request MUST be "Jules: Daily Run".