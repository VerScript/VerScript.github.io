name: Jules AI Agent Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  jules-run:
    runs-on: ubuntu-latest

    steps:
      - name: Run Jules AI Agent
        uses: google-labs-code/jules-action@main
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            You are an automated software assistant.
            - If triggered by an issue: analyze the codebase, implement a complete code solution, create a Pull Request titled "Jules: Solution for #${{ github.event.issue.number }}", and comment on the issue with the PR link and detailed explanation of the fix.
            - If triggered by daily schedule or workflow dispatch: scan the repository for bugs and vulnerabilities. If bugs or code improvements are found, implement fixes and create a Pull Request titled "Jules: Daily Run". If no updates are required, create an empty Pull Request (no file changes) titled "Jules: Daily Run". Do not create or update any daily run findings log files.
